<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>寶寶作息表</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🍼</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== 頂部標題 ===== -->
<header id="app-header">
  <h1 class="app-title">🍼 寶寶作息表 <small id="app-version" style="font-size:11px;opacity:0.6"></small></h1>
  <div id="date-nav">
    <button id="date-prev" onclick="changeDate(-1)">◀</button>
    <span id="today-date" onclick="openQuickDatePicker()"></span>
    <button id="date-next" onclick="changeDate(1)">▶</button>
    <button id="date-today-btn" class="hidden" onclick="goToday()">今天</button>
  </div>
</header>

<!-- ===== 快速日期選擇器 ===== -->
<div class="overlay hidden" id="date-picker-overlay" onclick="closeDatePicker(event)">
  <div class="date-picker-card">
    <div class="date-picker-header">
      <span id="dp-title">選擇日期</span>
      <button class="form-close" onclick="closeDatePickerForce()">✕</button>
    </div>
    <div id="dp-body"></div>
  </div>
</div>

<!-- ===== 快速記錄按鈕 ===== -->
<div id="quick-actions"></div>

<!-- ===== 今日摘要 ===== -->
<div id="today-summary" class="card">
  <h2 id="summary-title">📋 今日摘要</h2>
  <div id="summary-stats" class="summary-grid"></div>
</div>

<!-- ===== 今日時間線 ===== -->
<div id="timeline-section" class="card">
  <h2 id="timeline-title">🕐 今日記錄</h2>
  <div id="timeline"></div>
  <div id="timeline-empty" class="empty-hint">還沒有記錄，按上方按鈕開始！</div>
</div>

<!-- ===== 表單 Modal ===== -->
<div class="overlay hidden" id="form-overlay">
  <div class="form-card" id="form-card">
    <div class="form-header">
      <span id="form-title">記錄</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="form-delete hidden" id="btn-delete-type" onclick="deleteCurrentType()" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px" title="刪除此項目">🗑️</button>
        <button class="form-close" onclick="closeForm()">✕</button>
      </div>
    </div>
    <div class="form-body" id="form-body"></div>
    <div class="form-footer">
      <button class="btn-submit" id="btn-submit" onclick="submitForm()">
        <span id="btn-submit-text">記錄</span>
        <span id="btn-submit-loading" class="hidden">⏳ 送出中...</span>
      </button>
    </div>
  </div>
</div>

<!-- ===== 狀態提示 ===== -->
<div id="toast" class="toast hidden"></div>

<!-- ===== 連線設定（首次使用）===== -->
<div class="overlay" id="setup-overlay">
  <div class="form-card">
    <div class="form-header">
      <span>🔗 連接 Google Sheet</span>
    </div>
    <div class="form-body" style="padding: 20px">
      <p style="margin-bottom:12px;color:#666;font-size:14px">
        請先到 Google Sheet 部署 Apps Script，<br>
        然後把網址貼到下方。
      </p>
      <p style="margin-bottom:8px;font-size:13px;color:#999">
        詳細步驟見 <code>google-apps-script.js</code> 檔案頂部的註解
      </p>
      <input id="setup-url" type="url" placeholder="https://script.google.com/macros/s/..." 
             style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;margin-top:12px">
    </div>
    <div class="form-footer">
      <button class="btn-submit" onclick="saveSetup()">確認連接</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
